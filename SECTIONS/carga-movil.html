<div style="max-width: 100%; padding: 20px; font-family: 'Inter', sans-serif; background: #ffffff; min-height: 100vh; box-sizing: border-box;">
    
    <header style="text-align: center; margin-bottom: 20px;">
        <h2 style="color: #1d1d1f; margin: 0;">Captura de Documentos</h2>
        <p id="info-cliente" style="color: #d32f2f; font-weight: 700; margin-top: 5px;"></p>
    </header>
    
    <div style="display: flex; flex-direction: column; gap: 10px;">
        
        <div class="upload-field" id="box-perfil">
            <label>📸 FOTO ROSTRO (PERFIL)</label>
            <input type="file" accept="image/*" capture="user" onchange="inputCambio(this, 'perfil')">
            <div class="status-dot">⚪</div>
        </div>

        <div class="upload-field" id="box-ced1">
            <label>🪪 CÉDULA FRONTAL</label>
            <input type="file" accept="image/*" capture="environment" onchange="inputCambio(this, 'ced1')">
            <div class="status-dot">⚪</div>
        </div>

        <div class="upload-field" id="box-ced2">
            <label>🪪 CÉDULA TRASERA</label>
            <input type="file" accept="image/*" capture="environment" onchange="inputCambio(this, 'ced2')">
            <div class="status-dot">⚪</div>
        </div>

        <div class="upload-field" id="box-lic1">
            <label>💳 LICENCIA FRONTAL</label>
            <input type="file" accept="image/*" capture="environment" onchange="inputCambio(this, 'lic1')">
            <div class="status-dot">⚪</div>
        </div>

        <div class="upload-field" id="box-lic2">
            <label>💳 LICENCIA TRASERA</label>
            <input type="file" accept="image/*" capture="environment" onchange="inputCambio(this, 'lic2')">
            <div class="status-dot">⚪</div>
        </div>
    </div>

    <div style="margin-top: 30px; padding-bottom: 40px;">
        <button onclick="enviarAlPC()" id="btn-send" style="width: 100%; padding: 22px; background: #0071e3; color: white; border: none; border-radius: 16px; font-weight: 800; font-size: 1.2rem; box-shadow: 0 4px 15px rgba(0,0,0,0.2);">
            🚀 CARGAR AL COMPUTADOR
        </button>
    </div>

</div>

<style>
    .upload-field {
        position: relative;
        background: #f5f5f7;
        border: 2px solid #d2d2d7;
        padding: 22px;
        border-radius: 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        min-height: 80px;
    }
    .upload-field label { font-weight: 700; font-size: 0.9rem; color: #1d1d1f; }
    .upload-field input[type="file"] {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        opacity: 0; z-index: 10;
    }
    .upload-field.success {
        background: #e8f5e9 !important;
        border-color: #34c759 !important;
    }
    .status-dot { font-size: 1.5rem; }
</style>

<script>
    let cacheFotos = {};
    const urlParams = new URLSearchParams(window.location.search);
    const idCli = urlParams.get('id');
    
    document.getElementById('info-cliente').innerText = idCli ? "CC: " + idCli : "ERROR: ESCANEA DE NUEVO";

    function inputCambio(input, clave) {
        if (input.files && input.files[0]) {
            const currentBox = document.getElementById('box-' + clave);
            currentBox.querySelector('.status-dot').innerText = "⏳"; // Icono de procesando

            const reader = new FileReader();
            reader.onload = function(e) {
                cacheFotos[clave] = e.target.result;
                currentBox.classList.add('success');
                currentBox.querySelector('.status-dot').innerText = "✅";
                console.log("Foto guardada en memoria: " + clave);
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function enviarAlPC() {
        if (Object.keys(cacheFotos).length === 0) {
            alert("⚠️ No has tomado ninguna foto todavía.");
            return;
        }

        const canal = new BroadcastChannel('canal_rodemos');
        
        // Enviamos el objeto al PC
        canal.postMessage({
            id: idCli,
            fotos: cacheFotos
        });

        const btn = document.getElementById('btn-send');
        btn.innerText = "✅ ¡CARGADO EN PC!";
        btn.style.background = "#34c759";
        
        alert("Las fotos se enviaron. Revisa el computador ahora.");
    }
</script>
