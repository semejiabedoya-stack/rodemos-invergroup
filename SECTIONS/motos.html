<header><h1>Inventario de Motos</h1></header>

<div class="card">
    <h3>Agregar Nuevo Vehículo</h3>
    <div class="admin-form">
        <div class="grid-inputs">
            <div class="input-group">
                <label>Referencia / Modelo</label>
                <input type="text" id="mo-ref" placeholder="Ej: Yamaha NMAX 155">
            </div>
            <div class="input-group">
                <label>Placa</label>
                <input type="text" id="mo-placa" placeholder="Letras y Números">
            </div>
            <div class="input-group">
                <label>Número de Motor</label>
                <input type="text" id="mo-motor" placeholder="Serial del motor">
            </div>
            <div class="input-group">
                <label>Número de Chasis</label>
                <input type="text" id="mo-chasis" placeholder="Serial del chasis">
            </div>
        </div>
        <button type="button" onclick="guardarMoto()" class="btn-action">Registrar Moto</button>
    </div>
</div>
